<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぶいログ！ | わたしの日常ポートフォリオ</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="light-theme">
    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">🎥 ぶい<span>ログ！</span></div>
            <div id="auth-status" class="auth-status">
                <button id="login-trigger" class="btn-text">ログイン</button>
            </div>
        </div>
    </header>

    <main>
        <!-- メインコンテンツ領域（フィード・マイページ） -->
        <div id="content-container">
            <div class="container">
                <div class="tab-controls reveal">
                    <button class="tab-btn active" data-tab="feed">みんなの投稿</button>
                    <button class="tab-btn" data-tab="mypage">自分の記録</button>
                </div>
                <div id="content-grid" class="vlog-grid reveal">
                    <!-- JavaScriptで投稿カードが入ります -->
                </div>
            </div>
        </div>
    </main>

    <!-- 下部ナビゲーション（SNS風） -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-view="feed">🏠<span>ホーム</span></button>
        <button class="nav-item" id="post-trigger">➕<span>投稿</span></button>
        <button class="nav-item" data-view="mypage">👤<span>マイページ</span></button>
    </nav>

    <!-- 認証モーダル -->
    <div id="auth-modal" class="modal">
        <div class="modal-content auth-form-content">
            <span class="close-auth-modal">&times;</span>
            <div id="auth-forms">
                <div id="login-form">
                    <h2>おかえりなさい！</h2>
                    <input type="email" id="login-email" placeholder="メールアドレス">
                    <input type="password" id="login-password" placeholder="パスワード">
                    <button id="login-btn" class="btn btn-primary">ログイン</button>
                    <p>アカウントを持っていない？ <a href="#" id="to-signup">新規登録</a></p>
                </div>
                <div id="signup-form" style="display:none;">
                    <h2>アカウント作成</h2>
                    <input type="text" id="signup-name" placeholder="お名前">
                    <input type="email" id="signup-email" placeholder="メールアドレス">
                    <input type="password" id="signup-password" placeholder="パスワード">
                    <button id="signup-btn" class="btn btn-primary">登録する</button>
                    <p>すでにアカウントがある？ <a href="#" id="to-login">ログイン</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 投稿モーダル -->
    <div id="post-modal" class="modal">
        <div class="modal-content post-form-content">
            <span class="close-post-modal">&times;</span>
            <h2>新しい思い出を投稿</h2>
            <div class="post-form">
                <input type="text" id="post-title" placeholder="タイトル (例: 春の京都旅)">
                <input type="text" id="post-location" placeholder="場所 (例: 京都 / 嵐山)">
                <input type="text" id="post-thumbnail" placeholder="画像URL (Unsplashなど)">
                <textarea id="post-description" placeholder="この旅行の感想を一言"></textarea>
                
                <div class="timeline-input-area">
                    <h3>タイムライン (1件目)</h3>
                    <input type="text" id="tl-time-1" placeholder="時間 (例: 10:00)">
                    <input type="text" id="tl-event-1" placeholder="できごと (例: 到着！)">
                    <input type="text" id="tl-mood-1" placeholder="気分 (例: ワクワク)">
                    <textarea id="tl-text-1" placeholder="詳細な思い出"></textarea>
                </div>
                
                <button id="submit-post-btn" class="btn btn-primary">投稿を公開する</button>
            </div>
        </div>
    </div>

    <!-- 動画・旅ログ詳細用モーダル（既存） -->
    <div id="video-modal" class="modal">
        <div class="modal-content detail-modal-content">
            <span class="close-modal">&times;</span>
            <!-- Journey Map Area -->
            <div id="journey-map" class="journey-map-container"></div>
            
            <div class="video-container" style="display:none;">
                <iframe id="modal-iframe" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <div id="modal-description"></div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
