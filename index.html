<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぶいログ！ | わたしの日常ポートフォリオ</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="light-theme">
    <header class="main-header">
        <nav class="container">
            <div class="logo">🎥 ぶい<span>ログ！</span></div>
            <ul class="nav-links">
                <li><a href="#home">ホーム</a></li>
                <li><a href="#gallery">ギャラリー</a></li>
                <li><a href="#about">自己紹介</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="container hero-content">
                <div class="hero-text-box">
                    <h1 class="reveal">日々の「楽しい」を、<br>動画でお届け！</h1>
                    <p class="reveal">お散歩したり、何かを作ったり。私が見た素敵な景色や、ちょっとした日常をゆる〜く発信しています。</p>
                    <a href="#gallery" class="btn btn-primary reveal">動画を見てみる</a>
                </div>
            </div>
        </section>

        <section id="gallery" class="gallery">
            <div class="container">
                <div class="section-header">
                    <h2 class="reveal">みんなに見せたい思い出たち</h2>
                    <div class="tab-controls reveal">
                        <button class="tab-btn active" data-tab="vlog">動画（Vlog）</button>
                        <button class="tab-btn" data-tab="trip">旅の記録（旅ログ）</button>
                    </div>
                    <div class="filters reveal" id="vlog-filters">
                        <button class="filter-btn active" data-filter="all">ぜんぶ</button>
                        <button class="filter-btn" data-filter="おでかけ">おでかけ</button>
                        <button class="filter-btn" data-filter="ガジェット">ガジェット</button>
                        <button class="filter-btn" data-filter="日常">日常</button>
                    </div>
                </div>
                <div id="content-grid" class="vlog-grid reveal">
                    <!-- JavaScriptでここに内容が入ります -->
                </div>
            </div>
        </section>

        <section id="about" class="about">
            <div class="container about-flex">
                <div class="about-text reveal">
                    <h2>こんにちは！</h2>
                    <p>動画を作ることが大好きなクリエイターです。日常の何気ない瞬間を「宝物」に変えるような、あたたかい動画作りを目指しています。ゆっくりしていってね！</p>
                    <div class="social-links">
                        <a href="#" class="social-icon">YouTube</a>
                        <a href="#" class="social-icon">Instagram</a>
                    </div>
                </div>
                <div class="about-stats reveal">
                    <div class="stat-card">
                        <h3>100本</h3>
                        <p>つくった動画</p>
                    </div>
                    <div class="stat-card">
                        <h3>5万人</h3>
                        <p>フォロワーさん</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 ぶいログ！ ｜ 見てくれてありがとう！</p>
        </div>
    </footer>

    <!-- 動画を見るためのポップアップ -->
    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="video-container">
                <iframe id="modal-iframe" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="modal-info">
                <h3 id="modal-title"></h3>
                <p id="modal-description"></p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
